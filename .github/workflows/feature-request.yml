name: Implement Feature Request

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: contains(github.event.issue.labels.*.name, 'feature-request')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are working on PluginUpdater, a native macOS SwiftUI app for managing audio plugin updates.

            A feature has been requested in the GitHub issue above. Your job:

            1. Read and understand the feature request thoroughly
            2. Plan the implementation — identify which files need changes and what the approach should be
            3. Implement the feature with clean, minimal code
            4. Make sure the project builds: run `cd PluginUpdater && swift build`
            5. Run tests to verify nothing is broken: `cd PluginUpdater && swift test`
            6. Create a PR with a clear summary linking back to this issue

            Key project details:
            - Swift/SwiftUI, SwiftData, macOS 14+, no third-party deps
            - Build: `cd PluginUpdater && swift build` / `swift test`
            - Xcode project: `cd PluginUpdater && xcodegen generate` (run if you add/remove files)
            - Views are in PluginUpdater/PluginUpdater/Views/
            - Services in PluginUpdater/PluginUpdater/Services/
            - Models in PluginUpdater/PluginUpdater/Models/
          claude_args: "--model claude-sonnet-4-6"
